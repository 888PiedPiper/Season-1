<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт на обслуживании</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: #ccaa66;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            color: #888888;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a2a;
            border-top: 3px solid #ccaa66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 2rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>Сайт на обслуживании</h1>
        <p>Мы проводим технические работы. Сайт скоро вернётся в строй!<br>Следите за обновлениями в нашем Discord.</p>
        <p>"Свали с сайта, он на обслуживании! - © Романова Лера"</p>
        <div class="loader"></div>
    </div>
</body>
</html>
